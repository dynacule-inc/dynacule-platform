[pytest]
testpaths = qa/backend qa/pipeline qa/smoke
pythonpath = backend .

# ── Markers ───────────────────────────────────────────────────────────────
markers =
    api: API integration tests (requires FastAPI TestClient)
    unit: Pure unit tests (no external dependencies)
    worker: Celery task tests (mocked backend)
    pipeline: Computational pipeline accuracy/validation tests
    smoke: Docker integration smoke tests
    slow: Tests that take >10s to run (use --runslow to include)

# ── Async support ─────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Fixtures ──────────────────────────────────────────────────────────────
testpaths += qa/backend qa/pipeline qa/smoke
norecursedirs = node_modules .next __pycache__ .git

# ── Coverage ──────────────────────────────────────────────────────────────
addopts = -v --tb=short --strict-markers --cov=backend/app --cov-report=term --cov-report=html:qa/coverage_html
